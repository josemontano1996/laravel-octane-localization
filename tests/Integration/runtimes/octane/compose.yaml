services:
    laravel.test:
        build:
            context: "./vendor/laravel/sail/runtimes/${PHP_VERSION:-8.4}"
            dockerfile: Dockerfile
            args:
                WWWGROUP: "${WWWGROUP}"
        image: "sail-${PHP_VERSION:-8.4}/app"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "${APP_PORT:-80}:80"
            - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
        dns:
            - 8.8.8.8
            - 8.8.4.4
        environment:
            WWWUSER: "${WWWUSER}"
            LARAVEL_SAIL: 1
            XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
            XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
            IGNITION_LOCAL_SITES_PATH: "${PWD}"
            OCTANE_WORKERS: 1
            SESSION_DRIVER: array
            CACHE_STORE: array
            QUEUE_CONNECTION: sync
            DB_CONNECTION: sqlite
            DB_DATABASE: ":memory:"
            SUPERVISOR_PHP_COMMAND: "bash -c \"php artisan key:generate --force && php artisan optimize:clear && php artisan migrate --force && php artisan octane:install --server=frankenphp --no-interaction && php artisan octane:start --server=frankenphp --host=0.0.0.0 --admin-port=2019 --port=80\""
            XDG_CONFIG_HOME:  /var/www/tests/Integration/runtimes/octane/config
            XDG_DATA_HOME:  /var/www/tests/Integration/runtimes/octane/data

        volumes:
            - "../../../../:/var/www"
        working_dir: /var/www/tests/Integration/runtimes/octane
        networks:
            - sail
        depends_on: {}
networks:
    sail:
        driver: bridge
